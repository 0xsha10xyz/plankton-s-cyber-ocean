<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Plankton X Header (1500x500)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; background: #050a12; display: grid; place-items: center; min-height: 100vh; }
      .frame { width: 1500px; height: 500px; box-shadow: 0 20px 80px rgba(0,0,0,0.55); border-radius: 16px; overflow: hidden; }
      /* Helps when using browser "Save image" tools / screenshots */
      @media (max-width: 1600px) { .frame { transform: scale(0.9); transform-origin: top center; } }
      @media (max-width: 1400px) { .frame { transform: scale(0.75); } }
    </style>
  </head>
  <body>
    <div class="frame">
      <!-- Open this file in a browser. To export PNG: use your preferred tool or take a 1500x500 screenshot of the frame. -->
      <img
        src="./plankton-x-header-dark-clean.svg"
        width="1500"
        height="500"
        alt="Plankton X header banner"
        draggable="false"
        style="display:block"
      />
    </div>
  </body>
</html>
