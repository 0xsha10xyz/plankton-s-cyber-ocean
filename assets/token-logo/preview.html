<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Plankton Token Logo Preview</title>
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; background: #050a12; display: grid; place-items: center; min-height: 100vh; }
      .wrap { display: grid; gap: 16px; place-items: center; padding: 24px; }
      .card { background: #060c16; border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 18px; }
      .hint { color: rgba(230,237,247,0.72); font: 14px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; max-width: 720px; text-align: center; }
      img { width: 384px; height: 384px; image-rendering: auto; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <img src="./plankton-token-logo.png" width="1024" height="1024" alt="Plankton token logo" />
      </div>
      <div class="hint">
        Open this file in a browser. To export a PNG, use your preferred tool (or take a square screenshot of the logo).
        This PNG has a black background; if you need transparent, we can cut out the background next.
      </div>
    </div>
  </body>
</html>
