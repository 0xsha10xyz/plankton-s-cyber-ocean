name: Deploy (VPS)

on:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: planktonomous-syraa/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: planktonomous-syraa/backend/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run lint
      - name: Unit tests
        run: npm run test

  deploy:
    needs: [test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH (docker compose)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VPS_APP_DIR }}
            git pull
            docker compose -f planktonomous-syraa/docker-compose.prod.yml up -d --build
            docker compose -f planktonomous-syraa/docker-compose.prod.yml exec -T backend npx prisma migrate deploy

